# Nginx site config for https://todo.dvlpr.sh
#
# Install on the VM:
#   sudo cp deploy/nginx-todo.dvlpr.sh.conf /etc/nginx/sites-available/todo.dvlpr.sh
#   sudo ln -s /etc/nginx/sites-available/todo.dvlpr.sh /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain HTTPS certs (certbot rewrites this file to add the :443 server
# block and an HTTP->HTTPS redirect automatically):
#   sudo certbot --nginx -d todo.dvlpr.sh
#
# This is the pre-certbot (HTTP) version. After certbot runs it manages TLS here.

server {
    listen 80;
    listen [::]:80;
    server_name todo.dvlpr.sh;

    # Frontend: static SPA build served directly from the repo checkout.
    root /var/www/vibe-todo/frontend/dist;
    index index.html;

    # Long-cache hashed assets produced by Vite.
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API -> Node backend (path is preserved: /api/... stays /api/...).
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check lives at the backend root (/health), not under /api.
    location = /health {
        proxy_pass http://127.0.0.1:3001/health;
        proxy_set_header Host $host;
    }

    # SPA fallback: everything else returns index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
